steps:
  # Build the frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://zeliverybot-backend-46048432129.europe-west1.run.app'
      - '-t'
      - 'gcr.io/$PROJECT_ID/zeliverybot-frontend:$COMMIT_SHA'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zeliverybot-frontend:$COMMIT_SHA']

  # Deploy image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'zeliverybot-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/zeliverybot-frontend:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'

images:
  - 'gcr.io/$PROJECT_ID/zeliverybot-frontend:$COMMIT_SHA'
